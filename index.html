            });
            const [currentMonthIndex, setCurrentMonthIndex] = useState(new Date().getMonth());
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [items, setItems] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [checkedItems, setCheckedItems] = useState({});
            const [sortOrder, setSortOrder] = useState({});
            const [householdId, setHouseholdId] = useState(null);
            const [showMigrationModal, setShowMigrationModal] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [showAccountScreen, setShowAccountScreen] = useState(false);
            const [showManageTransactions, setShowManageTransactions] = useState(false);
            const [showItemForm, setShowItemForm] = useState(false);
            const [forecastCollapsed, setForecastCollapsed] = useState(() => {
                const cached = localStorage.getItem('finance-forecast-collapsed');
                return cached !== 'false'; // Default ingeklapt
            });
            const [transactionFilter, setTransactionFilter] = useState('all'); // all, checked, unchecked
            const [householdData, setHouseholdData] = useState(null);
            const [profileData, setProfileData] = useState(null);
            const [householdMembers, setHouseholdMembers] = useState([]);
            const [userHouseholds, setUserHouseholds] = useState([]);
            const [showHouseholdSwitcher, setShowHouseholdSwitcher] = useState(false);

            const months = ['Januari', 'Februari', 'Maart', 'April', 'Mei', 'Juni', 
                            'Juli', 'Augustus', 'September', 'Oktober', 'November', 'December'];

            // Check authentication status
            useEffect(() => {
                const loadSession = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user ?? null);
                    
                    // Load dark mode setting immediately if user exists
                    if (session?.user) {
                        const { data: settings } = await supabase
                            .from('user_settings')
                            .select('dark_mode')
                            .eq('id', session.user.id)
                            .single();
                        
                        if (settings) {
                            setDarkMode(settings.dark_mode);
                        }
                    }
                    
                    setLoading(false);
                };
                
                loadSession();

                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });

                return () => subscription.unsubscribe();
            }, []);

            // Load user data from Supabase
            useEffect(() => {
                if (!user) return;

                const loadUserData = async () => {
                    try {
                        // Get profile and household_id
                        const { data: profile, error: profileError } = await supabase
                            .from('profiles')
                            .select('*')
                            .eq('id', user.id)
                            .single();

                        if (profileError) throw profileError;
                        setHouseholdId(profile.household_id);
                        setProfileData(profile);

                        // Get all user's households
                        const { data: households, error: householdsError } = await supabase
                            .from('user_households')
                            .select(`
                                household_id,
                                role,
                                is_active,
                                households:household_id (
                                    id,
                                    name,
                                    invite_code
                                )
                            `)
                            .eq('user_id', user.id);

                        console.log('User households query:', { households, householdsError });

                        if (!householdsError && households) {
                            const formatted = households.map(h => ({
                                id: h.households.id,
                                name: h.households.name,
                                invite_code: h.households.invite_code,
                                role: h.role,
                                is_active: h.is_active
                            }));
                            console.log('Formatted user households:', formatted);
                            setUserHouseholds(formatted);
                        } else if (householdsError) {
                            console.error('Error loading user households:', householdsError);
                        }

                        // Get household data
                        const { data: household, error: householdError } = await supabase
                            .from('households')
                            .select('*')
                            .eq('id', profile.household_id)
                            .single();

                        if (householdError) throw householdError;
                        setHouseholdData(household);

                        // Get household members
                        const { data: members, error: membersError } = await supabase
                            .from('profiles')
                            .select('email, display_name')
                            .eq('household_id', profile.household_id);

                        if (!membersError) {
                            setHouseholdMembers(members || []);
                        }

                        // Get items
                        const { data: itemsData, error: itemsError } = await supabase
                            .from('items')
                            .select('*')
                            .eq('household_id', profile.household_id);

                        if (itemsError) throw itemsError;
                        setItems(itemsData || []);

                        // Get checked items
                        const { data: checkedData, error: checkedError } = await supabase
                            .from('checked_items')
                            .select('*')
                            .eq('household_id', profile.household_id);

                        if (checkedError) throw checkedError;
                        
                        // Convert to our format
                        const checkedMap = {};
                        (checkedData || []).forEach(item => {
                            const key = `${item.year}-${item.month}-${item.item_id}`;
                            checkedMap[key] = item.checked;
                        });
                        setCheckedItems(checkedMap);

                        // Get sort orders
                        const { data: sortData, error: sortError } = await supabase
                            .from('sort_orders')
                            .select('*')
                            .eq('household_id', profile.household_id);

                        if (sortError) throw sortError;
                        
                        // Convert to our format
                        const sortMap = {};
                        (sortData || []).forEach(order => {
                            const key = order.month === null ? '_default' : `${order.year}-${order.month}`;
                            sortMap[key] = order.item_order;
                        });
                        setSortOrder(sortMap);

                        // Check for old localStorage data only if no items in database
                        if (!itemsData || itemsData.length === 0) {
                            const oldItems = localStorage.getItem('finance-items');
                            const oldChecked = localStorage.getItem('finance-checked');
                            
                            // Show migration if there's any old data
                            if (oldItems && oldItems !== '[]' && oldItems !== 'null') {
                                console.log('Found old localStorage data:', oldItems);
                                setShowMigrationModal(true);
                            } else if (oldChecked && oldChecked !== '{}' && oldChecked !== 'null') {
                                console.log('Found old checked items:', oldChecked);
                                setShowMigrationModal(true);
                            }
                        }

                    } catch (error) {
                        console.error('Error loading data:', error);
                    }
                };

                loadUserData();
            }, [user]);

            // Save dark mode to Supabase and localStorage
            useEffect(() => {
                // Always save to localStorage for instant load on refresh
                localStorage.setItem('finance-dark-mode', darkMode);
                
                if (!user) return;
                
                const saveDarkMode = async () => {
                    await supabase
                        .from('user_settings')
                        .upsert({ id: user.id, dark_mode: darkMode });
                };

                saveDarkMode();
            }, [darkMode, user]);

            // Save forecast collapsed state to localStorage
            useEffect(() => {
                localStorage.setItem('finance-forecast-collapsed', forecastCollapsed);
            }, [forecastCollapsed]);

            const migrateLocalStorageData = async () => {
                if (!householdId) return;

                try {
                    const oldItems = JSON.parse(localStorage.getItem('finance-items') || '[]');
                    const oldChecked = JSON.parse(localStorage.getItem('finance-checked') || '{}');
                    const oldSort = JSON.parse(localStorage.getItem('finance-sort-order') || '{}');

                    // Migrate items
                    const itemsToInsert = oldItems.map(item => ({
                        household_id: householdId,
                        name: item.name,
                        amount: item.amount,
                        type: item.type,
                        frequency: item.frequency,
                        month: item.month,
                        year: item.year,
                        selected_months: item.selectedMonths || []
                    }));

                    const { data: insertedItems, error: itemsError } = await supabase
                        .from('items')
                        .insert(itemsToInsert)
                        .select();

                    if (itemsError) throw itemsError;

                    // Create mapping from old IDs to new IDs
                    const idMap = {};
                    oldItems.forEach((oldItem, index) => {
                        idMap[oldItem.id] = insertedItems[index].id;
                    });

                    // Migrate checked items
                    const checkedToInsert = [];
                    Object.entries(oldChecked).forEach(([key, checked]) => {
                        const [year, month, oldItemId] = key.split('-');
                        const newItemId = idMap[parseInt(oldItemId)];
                        if (newItemId && checked) {
                            checkedToInsert.push({
                                household_id: householdId,
                                item_id: newItemId,
                                year: parseInt(year),
                                month: parseInt(month),
                                checked: true
                            });
                        }
                    });

                    if (checkedToInsert.length > 0) {
                        const { error: checkedError } = await supabase
                            .from('checked_items')
                            .insert(checkedToInsert);
                        if (checkedError) throw checkedError;
                    }

                    // Migrate sort orders
                    const sortToInsert = [];
                    Object.entries(oldSort).forEach(([key, itemOrder]) => {
                        const newItemOrder = itemOrder.map(oldId => idMap[oldId]).filter(Boolean);
                        if (key === '_default') {
                            sortToInsert.push({
                                household_id: householdId,
                                year: null,
                                month: null,
                                item_order: newItemOrder
                            });
                        } else {
                            const [year, month] = key.split('-');
                            sortToInsert.push({
                                household_id: householdId,
                                year: parseInt(year),
                                month: parseInt(month),
                                item_order: newItemOrder
                            });
                        }
                    });

                    if (sortToInsert.length > 0) {
                        const { error: sortError } = await supabase
                            .from('sort_orders')
                            .insert(sortToInsert);
                        if (sortError) throw sortError;
                    }

                    // Clear localStorage after successful migration
                    localStorage.removeItem('finance-items');
                    localStorage.removeItem('finance-checked');
                    localStorage.removeItem('finance-sort-order');

                    // Reload data
                    window.location.reload();
                } catch (error) {
                    console.error('Migration error:', error);
                    alert('Er ging iets mis bij het importeren. Probeer het opnieuw of neem contact op.');
                }
            };

            // Import data from JSON file
            const importDataFromFile = async (event) => {
                const file = event.target.files[0];
                if (!file || !householdId) return;

                try {
                    const text = await file.text();
                    const importedData = JSON.parse(text);

                    // Validate data structure
                    if (!importedData.items || !Array.isArray(importedData.items)) {
                        alert('Ongeldig backup bestand!');
                        return;
                    }

                    // Import items
                    const itemsToInsert = importedData.items.map(item => ({
                        household_id: householdId,
                        name: item.name,
                        amount: item.amount,
                        type: item.type,
                        frequency: item.frequency,
                        month: item.month,
                        year: item.year,
                        selected_months: item.selectedMonths || item.selected_months || []
                    }));

                    const { data: insertedItems, error: itemsError } = await supabase
                        .from('items')
                        .insert(itemsToInsert)
                        .select();

                    if (itemsError) throw itemsError;

                    // Create ID mapping
                    const idMap = {};
                    importedData.items.forEach((oldItem, index) => {
                        idMap[oldItem.id] = insertedItems[index].id;
                    });

                    // Import checked items
                    const checkedToInsert = [];
                    if (importedData.checkedItems) {
                        Object.entries(importedData.checkedItems).forEach(([key, checked]) => {
                            const [year, month, oldItemId] = key.split('-');
                            const newItemId = idMap[parseInt(oldItemId)];
                            if (newItemId && checked) {
                                checkedToInsert.push({
                                    household_id: householdId,
                                    item_id: newItemId,
                                    year: parseInt(year),
                                    month: parseInt(month),
                                    checked: true
                                });
                            }
                        });

                        if (checkedToInsert.length > 0) {
                            await supabase.from('checked_items').insert(checkedToInsert);
                        }
                    }

                    // Import sort orders
                    const sortToInsert = [];
                    if (importedData.sortOrder) {
                        Object.entries(importedData.sortOrder).forEach(([key, itemOrder]) => {
                            const newItemOrder = itemOrder.map(oldId => idMap[oldId]).filter(Boolean);
                            if (key === '_default') {
                                sortToInsert.push({
                                    household_id: householdId,
                                    year: null,
                                    month: null,
                                    item_order: newItemOrder
                                });
                            } else {
                                const [year, month] = key.split('-');
                                sortToInsert.push({
                                    household_id: householdId,
                                    year: parseInt(year),
                                    month: parseInt(month),
                                    item_order: newItemOrder
                                });
                            }
                        });

                        if (sortToInsert.length > 0) {
                            await supabase.from('sort_orders').insert(sortToInsert);
                        }
                    }

                    alert('✅ Data succesvol geïmporteerd!');
                    window.location.reload();
                } catch (error) {
                    console.error('Import error:', error);
                    alert('❌ Er ging iets mis bij het importeren: ' + error.message);
                }
            };

            const getMonthKey = (year, month) => `${year}-${month}`;

            const toggleItem = async (itemId) => {
                const key = `${getMonthKey(currentYear, currentMonthIndex)}-${itemId}`;
                const newChecked = !checkedItems[key];

                setCheckedItems(prev => ({
                    ...prev,
                    [key]: newChecked
                }));

                // Save to Supabase
                await supabase
                    .from('checked_items')
                    .upsert({
                        household_id: householdId,
                        item_id: itemId,
                        year: currentYear,
                        month: currentMonthIndex,
                        checked: newChecked
                    });
            };

            const isItemChecked = (itemId) => {
                const key = `${getMonthKey(currentYear, currentMonthIndex)}-${itemId}`;
                return checkedItems[key] || false;
            };

            const shouldShowItem = (item, month, year) => {
                if (item.frequency === 'eenmalig') {
                    return item.month === month && item.year === year;
                } else if (item.frequency === 'maandelijks') {
                    return true;
                } else if (item.frequency === 'specifiek' && item.selected_months) {
                    return item.selected_months.includes(month);
                }
                return false;
            };

            const getCurrentMonthItems = () => {
                const monthKey = getMonthKey(currentYear, currentMonthIndex);
                const filtered = items.filter(item => shouldShowItem(item, currentMonthIndex, currentYear));
                
                if (sortOrder[monthKey] && sortOrder[monthKey].length > 0) {
                    return filtered.sort((a, b) => {
                        const indexA = sortOrder[monthKey].indexOf(a.id);
                        const indexB = sortOrder[monthKey].indexOf(b.id);
                        
                        if (indexA !== -1 && indexB !== -1) {
                            return indexA - indexB;
                        }
                        if (indexA !== -1) return -1;
                        if (indexB !== -1) return 1;
                        
                        return a.id - b.id;
                    });
                }
                
                if (sortOrder['_default'] && sortOrder['_default'].length > 0) {
                    return filtered.sort((a, b) => {
                        const indexA = sortOrder['_default'].indexOf(a.id);
                        const indexB = sortOrder['_default'].indexOf(b.id);
                        
                        if (indexA !== -1 && indexB !== -1) {
                            return indexA - indexB;
                        }
                        if (indexA !== -1) return -1;
                        if (indexB !== -1) return 1;
                        
                        return a.id - b.id;
                    });
                }
                
                return filtered.sort((a, b) => a.id - b.id);
            };

            const calculateTotals = () => {
                const currentItems = getCurrentMonthItems();
                const income = currentItems
                    .filter(item => item.type === 'inkomsten' && isItemChecked(item.id))
                    .reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
                
                const expenses = currentItems
                    .filter(item => item.type === 'uitgaven' && isItemChecked(item.id))
                    .reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
                
                return { income, expenses, balance: income - expenses };
            };

            const calculateFutureTotals = (startDate, endDate) => {
                let futureIncome = 0;
                let futureExpenses = 0;
                
                const start = new Date(startDate);
                const end = new Date(endDate);
                
                let currentDate = new Date(start.getFullYear(), start.getMonth(), 1);
                const endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
                
                while (currentDate <= endMonth) {
                    const month = currentDate.getMonth();
                    const year = currentDate.getFullYear();
                    const monthItems = items.filter(item => shouldShowItem(item, month, year));
                    
                    const monthKey = getMonthKey(year, month);
                    monthItems.forEach(item => {
                        const itemKey = `${monthKey}-${item.id}`;
                        const isChecked = checkedItems[itemKey] || false;
                        
                        if (!isChecked) {
                            if (item.type === 'inkomsten') {
                                futureIncome += parseFloat(item.amount || 0);
                            } else {
                                futureExpenses += parseFloat(item.amount || 0);
                            }
                        }
                    });
                    
                    currentDate.setMonth(currentDate.getMonth() + 1);
                }
                
                return { futureIncome, futureExpenses };
            };

            const [forecastStartDate, setForecastStartDate] = useState(() => {
                const currentMonth = new Date(currentYear, currentMonthIndex, 1);
                return currentMonth.toISOString().split('T')[0];
            });
            
            const [forecastEndDate, setForecastEndDate] = useState(() => {
                const currentMonthEnd = new Date(currentYear, currentMonthIndex + 1, 0);
                return currentMonthEnd.toISOString().split('T')[0];
            });

            const nextMonth = () => {
                if (currentMonthIndex === 11) {
                    setCurrentMonthIndex(0);
                    setCurrentYear(currentYear + 1);
                    const currentMonth = new Date(currentYear + 1, 0, 1);
                    setForecastStartDate(currentMonth.toISOString().split('T')[0]);
                    const endCurrentMonth = new Date(currentYear + 1, 1, 0);
                    setForecastEndDate(endCurrentMonth.toISOString().split('T')[0]);
                } else {
                    setCurrentMonthIndex(currentMonthIndex + 1);
                    const currentMonth = new Date(currentYear, currentMonthIndex + 1, 1);
                    setForecastStartDate(currentMonth.toISOString().split('T')[0]);
                    const endCurrentMonth = new Date(currentYear, currentMonthIndex + 2, 0);
                    setForecastEndDate(endCurrentMonth.toISOString().split('T')[0]);
                }
            };

            const prevMonth = () => {
                if (currentMonthIndex === 0) {
                    setCurrentMonthIndex(11);
                    setCurrentYear(currentYear - 1);
                    const currentMonth = new Date(currentYear - 1, 11, 1);
                    setForecastStartDate(currentMonth.toISOString().split('T')[0]);
                    const endCurrentMonth = new Date(currentYear - 1, 12, 0);
                    setForecastEndDate(endCurrentMonth.toISOString().split('T')[0]);
                } else {
                    setCurrentMonthIndex(currentMonthIndex - 1);
                    const currentMonth = new Date(currentYear, currentMonthIndex - 1, 1);
                    setForecastStartDate(currentMonth.toISOString().split('T')[0]);
                    const endCurrentMonth = new Date(currentYear, currentMonthIndex, 0);
                    setForecastEndDate(endCurrentMonth.toISOString().split('T')[0]);
                }
            };

            const addOrUpdateItem = async (item) => {
                if (editingItem) {
                    // Update existing item
                    const { error } = await supabase
                        .from('items')
                        .update({
                            name: item.name,
                            amount: item.amount,
                            type: item.type,
                            frequency: item.frequency,
                            month: item.month,
                            year: item.year,
                            selected_months: item.selectedMonths || []
                        })
                        .eq('id', editingItem.id);

                    if (!error) {
                        setItems(items.map(i => i.id === editingItem.id ? { ...item, id: editingItem.id } : i));
                    }
                } else {
                    // Insert new item
                    const { data, error } = await supabase
                        .from('items')
                        .insert({
                            household_id: householdId,
                            name: item.name,
                            amount: item.amount,
                            type: item.type,
                            frequency: item.frequency,
                            month: item.month,
                            year: item.year,
                            selected_months: item.selectedMonths || []
                        })
                        .select()
                        .single();

                    if (!error) {
                        setItems([...items, data]);
                    }
                }
                setShowModal(false);
                setEditingItem(null);
            };

            const deleteItem = async (id) => {
                await supabase
                    .from('items')
                    .delete()
                    .eq('id', id);

                setItems(items.filter(item => item.id !== id));
                
                // Clean up checked states
                const newChecked = { ...checkedItems };
                Object.keys(newChecked).forEach(key => {
                    if (key.endsWith(`-${id}`)) delete newChecked[key];
                });
                setCheckedItems(newChecked);
            };

            const handleDragStart = (e, itemId) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', itemId);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = async (e, targetItemId) => {
                e.preventDefault();
                const draggedItemId = parseInt(e.dataTransfer.getData('text/plain'));
                
                if (draggedItemId === targetItemId) return;
                
                const monthKey = getMonthKey(currentYear, currentMonthIndex);
                const currentItems = getCurrentMonthItems();
                const currentOrder = sortOrder[monthKey] || sortOrder['_default'] || currentItems.map(item => item.id);
                
                const newOrder = currentOrder.filter(id => id !== draggedItemId);
                const targetIndex = newOrder.indexOf(targetItemId);
                newOrder.splice(targetIndex, 0, draggedItemId);
                
                const newSortOrder = {
                    ...sortOrder,
                    [monthKey]: newOrder,
                    '_default': newOrder
                };
                
                setSortOrder(newSortOrder);

                // Save both month-specific and default to Supabase
                try {
                    // First, delete existing entries for this month and default
                    await supabase
                        .from('sort_orders')
                        .delete()
                        .eq('household_id', householdId)
                        .eq('year', currentYear)
                        .eq('month', currentMonthIndex);

                    await supabase
                        .from('sort_orders')
                        .delete()
                        .eq('household_id', householdId)
                        .is('year', null)
                        .is('month', null);

                    // Then insert new ones
                    await supabase
                        .from('sort_orders')
                        .insert({
                            household_id: householdId,
                            year: currentYear,
                            month: currentMonthIndex,
                            item_order: newOrder
                        });

                    await supabase
                        .from('sort_orders')
                        .insert({
                            household_id: householdId,
                            year: null,
                            month: null,
                            item_order: newOrder
                        });
                } catch (error) {
                    console.error('Error saving sort order:', error);
                }
            };

            const switchHousehold = async (householdId) => {
                try {
                    // Call Supabase function to switch active household
                    const { error } = await supabase.rpc('switch_active_household', {
                        p_user_id: user.id,
                        p_household_id: householdId
                    });

                    if (error) throw error;

                    // Reload the page to fetch new household data
                    window.location.reload();
                } catch (error) {
                    console.error('Error switching household:', error);
                    alert('Kon niet switchen naar household: ' + error.message);
                }
            };

            const createNewHousehold = async (householdName) => {
                try {
                    // Generate invite code
                    const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();

                    // Create new household
                    const { data: newHousehold, error: createError } = await supabase
                        .from('households')
                        .insert({ name: householdName, invite_code: inviteCode })
                        .select()
                        .single();

                    if (createError) throw createError;

                    // Add user to this household
                    const { error: joinError } = await supabase
                        .from('user_households')
                        .insert({
                            user_id: user.id,
                            household_id: newHousehold.id,
                            role: 'owner',
                            is_active: false
                        });

                    if (joinError) throw joinError;

                    // Switch to the new household
                    await switchHousehold(newHousehold.id);
                } catch (error) {
                    console.error('Error creating household:', error);
                    alert('Kon geen nieuw household maken: ' + error.message);
                }
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                            <p className="text-gray-600">Laden...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <AuthScreen onLogin={setUser} />;
            }

            const totals = calculateTotals();
            const futureTotals = calculateFutureTotals(forecastStartDate, forecastEndDate);

            const theme = darkMode ? {
                bg: 'bg-gray-900',
                card: 'bg-gray-800',
                text: 'text-gray-100',
                textSecondary: 'text-gray-400',
                border: 'border-gray-700',
                income: 'bg-emerald-900 text-emerald-100',
                expense: 'bg-rose-900 text-rose-100',
                button: 'bg-blue-600 hover:bg-blue-700',
                checked: 'bg-gray-700'
            } : {
                bg: 'bg-gradient-to-br from-blue-50 to-indigo-50',
                card: 'bg-white',
                text: 'text-gray-800',
                textSecondary: 'text-gray-600',
                border: 'border-gray-200',
                income: 'bg-emerald-50 text-emerald-700',
                expense: 'bg-rose-50 text-rose-700',
                button: 'bg-indigo-500 hover:bg-indigo-600',
                checked: 'bg-gray-50'
            };

            return (
                <div className={`min-h-screen ${theme.bg} ${theme.text} transition-colors duration-300`}>
                    {/* Top Menu Bar - Sticky */}
                    <div className={`sticky top-0 z-30 ${theme.card} shadow-md`}>
                        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button
                                    onClick={() => setShowMenu(true)}
                                    className={`p-2 rounded-lg ${theme.button} text-white transition-all`}
                                >
                                    <Menu size={20} />
                                </button>
                                <h1 className="text-xl font-bold">FinApp</h1>
                            </div>
                            <span className="text-xs text-gray-400 font-mono">v0.1</span>
                        </div>
                    </div>

                    <div className="max-w-2xl mx-auto flex flex-col" style={{height: 'calc(100vh - 60px)'}}>
                        {/* Month Navigation - Sticky Top */}
                        <div className={`${theme.card} shadow-lg p-4 m-4 mb-2 rounded-2xl sticky top-16 z-20`}>
                            <div className="flex items-center justify-center gap-4">
                                <button onClick={prevMonth} className={`p-2 rounded-lg ${theme.button} text-white`}>
                                    <ChevronLeft size={20} />
                                </button>
                                <div className="text-center min-w-[180px]">
                                    <h2 className="text-lg font-semibold">{months[currentMonthIndex]} {currentYear}</h2>
                                </div>
                                <button onClick={nextMonth} className={`p-2 rounded-lg ${theme.button} text-white`}>
                                    <ChevronRight size={20} />
                                </button>
                            </div>
                        </div>

                        {/* Transactions List - Scrollable */}
                        <div className="flex-1 overflow-y-auto px-4">
                            <div className={`${theme.card} rounded-2xl shadow-lg p-4`}>
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-base font-semibold">Transacties</h3>
                                    <button
                                        onClick={() => {
                                            setEditingItem(null);
                                            setShowItemForm(true);
                                        }}
                                        className={`${theme.button} text-white rounded-lg p-2 transition-all flex items-center gap-1`}
                                    >
                                        <Plus size={18} />
                                    </button>
                                </div>

                                {/* Filter Buttons */}
                                <div className="flex gap-2 mb-3">
                                    <button
                                        onClick={() => setTransactionFilter('all')}
                                        className={`flex-1 px-3 py-1.5 text-xs rounded-lg transition-all ${
                                            transactionFilter === 'all' 
                                                ? 'bg-indigo-500 text-white' 
                                                : theme.border + ' border'
                                        }`}
                                    >
                                        Alle
                                    </button>
                                    <button
                                        onClick={() => setTransactionFilter('checked')}
                                        className={`flex-1 px-3 py-1.5 text-xs rounded-lg transition-all ${
                                            transactionFilter === 'checked' 
                                                ? 'bg-green-600 text-white' 
                                                : theme.border + ' border'
                                        }`}
                                    >
                                        ✓ Afgevinkt
                                    </button>
                                    <button
                                        onClick={() => setTransactionFilter('unchecked')}
                                        className={`flex-1 px-3 py-1.5 text-xs rounded-lg transition-all ${
                                            transactionFilter === 'unchecked' 
                                                ? 'bg-rose-600 text-white' 
                                                : theme.border + ' border'
                                        }`}
                                    >
                                        ☐ Te doen
                                    </button>
                                </div>

                                {(() => {
                                    const currentItems = getCurrentMonthItems();
                                    const filteredItems = currentItems.filter(item => {
                                        if (transactionFilter === 'all') return true;
                                        if (transactionFilter === 'checked') return isItemChecked(item.id);
                                        if (transactionFilter === 'unchecked') return !isItemChecked(item.id);
                                        return true;
                                    });

                                    if (filteredItems.length === 0) {
                                        return <p className={`${theme.textSecondary} text-sm italic text-center py-4`}>
                                            {transactionFilter === 'all' ? 'Geen transacties deze maand' : 
                                             transactionFilter === 'checked' ? 'Geen afgevinkte items' : 
                                             'Geen items te doen'}
                                        </p>;
                                    }

                                    return (
                                        <div>
                                            {filteredItems.map(item => (
                                                <div
                                                    key={item.id}
                                                    className={`${isItemChecked(item.id) ? theme.checked : ''} ${theme.border} border border-l-4 ${
                                                        item.type === 'inkomsten' 
                                                            ? (theme.bg === 'bg-gray-900' ? 'border-l-emerald-500' : 'border-l-emerald-400')
                                                            : (theme.bg === 'bg-gray-900' ? 'border-l-rose-500' : 'border-l-rose-400')
                                                    } rounded-lg p-3 mb-2 flex items-center justify-between transition-all`}
                                                >
                                                    <div className="flex items-center flex-1">
                                                        <button
                                                            onClick={() => toggleItem(item.id)}
                                                            className={`w-6 h-6 rounded border-2 ${isItemChecked(item.id) ? 'bg-indigo-500 border-indigo-500' : theme.border} flex items-center justify-center mr-3 transition-all flex-shrink-0`}
                                                        >
                                                            {isItemChecked(item.id) && <Check size={16} className="text-white" />}
                                                        </button>
                                                        <div className="flex-1 min-w-0">
                                                            <p className={`font-medium text-sm ${isItemChecked(item.id) ? 'line-through opacity-60' : ''}`}>{item.name}</p>
                                                            <p className={`text-xs ${theme.textSecondary}`}>
                                                                {item.frequency === 'eenmalig' ? 'Eenmalig' : 
                                                                 item.frequency === 'maandelijks' ? 'Maandelijks' : 
                                                                 'Specifieke maanden'}
                                                            </p>
                                                        </div>
                                                        <p className={`font-bold text-sm mr-2 ${isItemChecked(item.id) ? 'opacity-60' : item.type === 'inkomsten' ? 'text-emerald-600' : 'text-rose-600'} flex-shrink-0`}>
                                                            {item.type === 'inkomsten' ? '+' : '-'}€{parseFloat(item.amount).toFixed(2)}
                                                        </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>

                        {/* Forecast - Sticky Bottom */}
                        <div className={`${theme.card} shadow-lg m-4 mt-2 rounded-2xl sticky bottom-0 z-20`}>
                            <button
                                onClick={() => setForecastCollapsed(!forecastCollapsed)}
                                className="w-full p-4 flex items-center justify-between"
                            >
                                <div className="flex items-center gap-2">
                                    <span className="text-base font-semibold">📊 Prognose</span>
                                </div>
                                {forecastCollapsed ? <ChevronRight size={20} /> : <ChevronLeft size={20} className="rotate-90" />}
                            </button>
                            
                            {!forecastCollapsed && (
                                <div className="px-4 pb-4">
                                    <p className={`text-xs ${theme.textSecondary} mb-3`}>Laat alleen niet-afgevinkte items zien</p>
                                    
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        <div>
                                            <label className={`block text-xs ${theme.textSecondary} mb-1`}>Van</label>
                                            <input
                                                type="date"
                                                value={forecastStartDate}
                                                onChange={(e) => setForecastStartDate(e.target.value)}
                                                className={`w-full p-2 text-sm ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                            />
                                        </div>
                                        <div>
                                            <label className={`block text-xs ${theme.textSecondary} mb-1`}>Tot</label>
                                            <input
                                                type="date"
                                                value={forecastEndDate}
                                                onChange={(e) => setForecastEndDate(e.target.value)}
                                                className={`w-full p-2 text-sm ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div className={`${theme.income} rounded-lg p-3`}>
                                            <p className="text-xs opacity-75 mb-1">Verwachte Inkomsten</p>
                                            <p className="text-base font-bold">€{futureTotals.futureIncome.toFixed(2)}</p>
                                        </div>
                                        <div className={`${theme.expense} rounded-lg p-3`}>
                                            <p className="text-xs opacity-75 mb-1">Verwachte Uitgaven</p>
                                            <p className="text-base font-bold">€{futureTotals.futureExpenses.toFixed(2)}</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Slide-in Menu */}
                    {showMenu && (
                        <>
                            {/* Overlay */}
                            <div 
                                className="fixed inset-0 bg-black bg-opacity-50 z-40"
                                onClick={() => setShowMenu(false)}
                            ></div>
                            
                            {/* Menu Panel */}
                            <div className={`fixed top-0 left-0 h-full w-80 ${theme.card} shadow-2xl z-50 p-6 transform transition-transform flex flex-col`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">Menu</h2>
                                    <button
                                        onClick={() => setShowMenu(false)}
                                        className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg"
                                    >
                                        <X size={20} />
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {/* Account Settings */}
                                    <button
                                        onClick={() => {
                                            setShowAccountScreen(true);
                                            setShowMenu(false);
                                        }}
                                        className={`w-full flex items-center gap-3 p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all`}
                                    >
                                        <User size={20} />
                                        <span>Account Instellingen</span>
                                    </button>

                                    {/* Household Switcher Section */}
                                    <div className={`${theme.border} border rounded-lg p-3`}>
                                        <p className="text-xs text-gray-500 mb-2">
                                            Households (debug: {userHouseholds.length} households gevonden)
                                        </p>
                                        
                                        {/* Current Active Household */}
                                        {householdData ? (
                                            <div className={`flex items-center gap-2 p-2 rounded-lg ${theme.bg === 'bg-gray-900' ? 'bg-gray-700' : 'bg-gray-100'} mb-2`}>
                                                <span className="text-sm">🏠 {householdData.name}</span>
                                                <span className="text-xs bg-green-500 text-white px-2 py-0.5 rounded ml-auto">Actief</span>
                                            </div>
                                        ) : (
                                            <p className="text-xs text-red-500">Geen householdData</p>
                                        )}
                                        
                                        {/* Other Households */}
                                        {userHouseholds.filter(h => h.id !== householdId).map(h => (
                                            <button
                                                key={h.id}
                                                onClick={() => switchHousehold(h.id)}
                                                className={`w-full text-left flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-all mb-1`}
                                            >
                                                <span className="text-sm">🏠 {h.name}</span>
                                            </button>
                                        ))}
                                        
                                        {/* Create New Household */}
                                        <button
                                            onClick={() => {
                                                console.log('Create new household clicked');
                                                const name = prompt('Naam voor nieuwe household:');
                                                if (name && name.trim()) {
                                                    createNewHousehold(name.trim());
                                                }
                                            }}
                                            className="w-full text-xs text-indigo-600 hover:text-indigo-700 font-medium mt-2 text-left"
                                        >
                                            + Nieuw Household
                                        </button>
                                    </div>

                                    {/* Manage Transactions */}
                                    <button
                                        onClick={() => {
                                            setShowManageTransactions(true);
                                            setShowMenu(false);
                                        }}
                                        className={`w-full flex items-center gap-3 p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all`}
                                    >
                                        <Edit2 size={20} />
                                        <span>Transacties Beheren</span>
                                    </button>

                                    {/* Import Backup */}
                                    <label className={`w-full flex items-center gap-3 p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all cursor-pointer`}>
                                        <Upload size={20} />
                                        <span>Importeer Backup</span>
                                        <input
                                            type="file"
                                            accept=".json"
                                            onChange={(e) => {
                                                importDataFromFile(e);
                                                setShowMenu(false);
                                            }}
                                            className="hidden"
                                        />
                                    </label>

                                    {/* Theme Toggle */}
                                    <button
                                        onClick={() => {
                                            setDarkMode(!darkMode);
                                        }}
                                        className={`w-full flex items-center gap-3 p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all`}
                                    >
                                        {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                                        <span>{darkMode ? 'Licht Thema' : 'Donker Thema'}</span>
                                    </button>

                                    {/* Divider */}
                                    <div className={`border-t ${theme.border} my-4`}></div>

                                    {/* Logout */}
                                    <button
                                        onClick={() => {
                                            handleLogout();
                                            setShowMenu(false);
                                        }}
                                        className={`w-full flex items-center gap-3 p-3 hover:bg-red-50 dark:hover:bg-red-900 text-red-600 dark:text-red-400 rounded-lg transition-all`}
                                    >
                                        <LogOut size={20} />
                                        <span>Uitloggen</span>
                                    </button>
                                </div>

                                {/* User Info Footer */}
                                <div className={`mt-auto pt-4 border-t ${theme.border}`}>
                                    <p className="text-sm font-medium">{profileData?.display_name || 'Gebruiker'}</p>
                                    <p className="text-xs text-gray-500">{user.email}</p>
                                </div>
                            </div>
                        </>
                    )}

                    {/* Account Screen */}
                    {showAccountScreen && (
                        <AccountScreen
                            user={user}
                            profileData={profileData}
                            householdData={householdData}
                            householdMembers={householdMembers}
                            darkMode={darkMode}
                            onClose={() => setShowAccountScreen(false)}
                            onUpdate={async () => {
                                // Reload user data after update
                                const { data: profile } = await supabase
                                    .from('profiles')
                                    .select('*')
                                    .eq('id', user.id)
                                    .single();
                                setProfileData(profile);

                                const { data: household } = await supabase
                                    .from('households')
                                    .select('*')
                                    .eq('id', profile.household_id)
                                    .single();
                                setHouseholdData(household);

                                const { data: members } = await supabase
                                    .from('profiles')
                                    .select('email, display_name')
                                    .eq('household_id', profile.household_id);
                                setHouseholdMembers(members || []);
                            }}
                            theme={theme}
                        />
                    )}

                    {/* Modals */}
                    {/* Manage Transactions Screen */}
                    {showManageTransactions && (
                        <ManageTransactionsScreen
                            items={items}
                            sortOrder={sortOrder}
                            currentYear={currentYear}
                            currentMonth={currentMonthIndex}
                            getMonthKey={getMonthKey}
                            onEdit={(item) => {
                                setEditingItem(item);
                                setShowManageTransactions(false);
                                setShowItemForm(true);
                            }}
                            onDelete={deleteItem}
                            onReorder={(draggedId, targetId) => {
                                // Use existing handleDrop function
                                const fakeEvent = {
                                    preventDefault: () => {},
                                    dataTransfer: {
                                        getData: () => String(draggedId)
                                    }
                                };
                                handleDrop(fakeEvent, targetId);
                            }}
                            onClose={() => setShowManageTransactions(false)}
                            theme={theme}
                        />
                    )}

                    {/* Item Form Screen */}
                    {showItemForm && (
                        <ItemModal
                            item={editingItem}
                            onSave={(item) => {
                                addOrUpdateItem(item);
                                setShowItemForm(false);
                                setEditingItem(null);
                            }}
                            onClose={() => {
                                setShowItemForm(false);
                                setEditingItem(null);
                            }}
                            theme={theme}
                            currentMonth={currentMonthIndex}
                            currentYear={currentYear}
                        />
                    )}

                    {showMigrationModal && (
                        <MigrationModal
                            onMigrate={() => {
                                migrateLocalStorageData();
                                setShowMigrationModal(false);
                            }}
                            onSkip={() => setShowMigrationModal(false)}
                            theme={theme}
                        />
                    )}
                </div>
            );
        };

        const ItemModal = ({ item, onSave, onClose, theme, currentMonth, currentYear }) => {
            const [formData, setFormData] = useState(item || {
                name: '',
                amount: '',
                type: 'uitgaven',
                frequency: 'maandelijks',
                month: currentMonth,
                year: currentYear,
                selectedMonths: []
            });

            const months = ['Januari', 'Februari', 'Maart', 'April', 'Mei', 'Juni', 
                            'Juli', 'Augustus', 'September', 'Oktober', 'November', 'December'];

            const toggleMonth = (monthIndex) => {
                const selected = formData.selectedMonths || formData.selected_months || [];
                if (selected.includes(monthIndex)) {
                    setFormData({ ...formData, selectedMonths: selected.filter(m => m !== monthIndex) });
                } else {
                    setFormData({ ...formData, selectedMonths: [...selected, monthIndex] });
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (formData.name && formData.amount) {
                    onSave(formData);
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className={`${theme.card} rounded-2xl shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto`}>
                        {/* Sticky Header */}
                        <div className={`sticky top-0 ${theme.card} p-6 border-b ${theme.border} flex justify-between items-center z-10`}>
                            <h2 className="text-xl font-bold">{item ? 'Item Bewerken' : 'Nieuw Item'}</h2>
                            <button onClick={onClose} type="button" className={`p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg`}>
                                <X size={20} />
                            </button>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6">
                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-2">Naam</label>
                                <input
                                    type="text"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    className={`w-full p-2 ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                    required
                                />
                            </div>

                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-2">Bedrag (€)</label>
                                <input
                                    type="number"
                                    step="0.01"
                                    value={formData.amount}
                                    onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                    className={`w-full p-2 ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                    required
                                />
                            </div>

                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-2">Type</label>
                                <div className="flex gap-2">
                                    <button
                                        type="button"
                                        onClick={() => setFormData({ ...formData, type: 'inkomsten' })}
                                        className={`flex-1 p-2 rounded-lg ${formData.type === 'inkomsten' ? 'bg-emerald-500 text-white' : theme.border + ' border'}`}
                                    >
                                        Inkomsten
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setFormData({ ...formData, type: 'uitgaven' })}
                                        className={`flex-1 p-2 rounded-lg ${formData.type === 'uitgaven' ? 'bg-rose-500 text-white' : theme.border + ' border'}`}
                                    >
                                        Uitgaven
                                    </button>
                                </div>
                            </div>

                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-2">Frequentie</label>
                                <select
                                    value={formData.frequency}
                                    onChange={(e) => setFormData({ ...formData, frequency: e.target.value })}
                                    className={`w-full p-2 ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                >
                                    <option value="maandelijks">Maandelijks</option>
                                    <option value="eenmalig">Eenmalig</option>
                                    <option value="specifiek">Specifieke maanden</option>
                                </select>
                            </div>

                            {formData.frequency === 'eenmalig' && (
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Maand</label>
                                    <select
                                        value={formData.month}
                                        onChange={(e) => setFormData({ ...formData, month: parseInt(e.target.value) })}
                                        className={`w-full p-2 ${theme.card} ${theme.border} border rounded-lg ${theme.text}`}
                                    >
                                        {months.map((month, index) => (
                                            <option key={index} value={index}>{month}</option>
                                        ))}
                                    </select>
                                </div>
                            )}

                            {formData.frequency === 'specifiek' && (
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Selecteer Maanden</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {months.map((month, index) => (
                                            <button
                                                key={index}
                                                type="button"
                                                onClick={() => toggleMonth(index)}
                                                className={`p-2 rounded-lg text-xs ${
                                                    (formData.selectedMonths || formData.selected_months || []).includes(index)
                                                        ? 'bg-indigo-500 text-white'
                                                        : theme.border + ' border'
                                                }`}
                                            >
                                                {month.substring(0, 3)}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-2">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className={`flex-1 p-2 ${theme.border} border rounded-lg`}
                                >
                                    Annuleren
                                </button>
                                <button
                                    type="submit"
                                    className={`flex-1 p-2 ${theme.button} text-white rounded-lg`}
                                >
                                    Opslaan
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FinanceTracker />);
    </script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker geregistreerd:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker registratie mislukt:', error);
                    });
            });
        }
    </script>
</body>
</html>
