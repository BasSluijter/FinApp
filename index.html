<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Persoonlijke financiële tracker app">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FinApp">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%236366f1'/%3E%3Cpath d='M96 40c-30.9 0-56 25.1-56 56s25.1 56 56 56 56-25.1 56-56-25.1-56-56-56zm0 96c-22.1 0-40-17.9-40-40s17.9-40 40-40 40 17.9 40 40-17.9 40-40 40z' fill='%23fff'/%3E%3Cpath d='M96 64c-4.4 0-8 3.6-8 8v16h-8c-4.4 0-8 3.6-8 8s3.6 8 8 8h8v8c0 4.4 3.6 8 8 8s8-3.6 8-8v-8h8c4.4 0 8-3.6 8-8s-3.6-8-8-8h-8V72c0-4.4-3.6-8-8-8z' fill='%23fff'/%3E%3C/svg%3E">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase Config - Pas config.js aan met jouw credentials -->
    <script src="./config.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Haal configuratie uit config.js (of fallback naar placeholder)
        const SUPABASE_URL = (typeof window.SUPABASE_CONFIG !== 'undefined' && window.SUPABASE_CONFIG?.url) || 'PLAK_HIER_JOUW_PROJECT_URL';
        const SUPABASE_ANON_KEY = (typeof window.SUPABASE_CONFIG !== 'undefined' && window.SUPABASE_CONFIG?.anonKey) || 'PLAK_HIER_JOUW_ANON_KEY';
        
        // Check of configuratie is ingevuld
        if (SUPABASE_URL === 'PLAK_HIER_JOUW_PROJECT_URL' || SUPABASE_ANON_KEY === 'PLAK_HIER_JOUW_ANON_KEY') {
            document.body.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(to bottom right, #eff6ff, #eef2ff); padding: 20px;">
                    <div style="background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; max-width: 500px; text-align: center;">
                        <h1 style="color: #dc2626; font-size: 24px; margin-bottom: 16px;">⚠️ Configuratie Ontbreekt</h1>
                        <p style="color: #4b5563; margin-bottom: 24px;">De Supabase configuratie is niet ingevuld.</p>
                        <div style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; text-align: left; margin-bottom: 16px;">
                            <p style="color: #991b1b; font-weight: 600; margin-bottom: 8px;">Oplossing:</p>
                            <ol style="color: #7f1d1d; margin-left: 20px; line-height: 1.6;">
                                <li>Open <code style="background: #fee2e2; padding: 2px 6px; border-radius: 4px;">config.js</code></li>
                                <li>Vul je Supabase URL en API key in</li>
                                <li>Ververs deze pagina</li>
                            </ol>
                        </div>
                        <a href="QUICK_SETUP.md" style="display: inline-block; background: #3b82f6; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 500;">
                            📖 Lees Setup Handleiding
                        </a>
                    </div>
                </div>
            `;
            throw new Error('Supabase niet geconfigureerd');
        }
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Lucide Icons as SVG components
        const Plus = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const Trash2 = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const Edit2 = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
        );

        const ChevronLeft = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );

        const ChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Sun = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        );

        const Moon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        );

        const Check = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const LogOut = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const Upload = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const Menu = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        );

        const User = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const Home = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        );

        const Copy = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const X = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const UserPlus = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
        );

        // Account Screen Component
        const AccountScreen = ({ user, profileData, householdData, householdMembers, darkMode, onClose, onUpdate, theme }) => {
            const [displayName, setDisplayName] = useState(profileData?.display_name || '');
            const [householdName, setHouseholdName] = useState(householdData?.name || '');
            const [inviteCode, setInviteCode] = useState('');
            const [saving, setSaving] = useState(false);
            const [message, setMessage] = useState('');
            const [showInviteInput, setShowInviteInput] = useState(false);

            const generateInviteCode = async () => {
                setSaving(true);
                try {
                    // Generate random 6-char code
                    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                    
                    const { error } = await supabase
                        .from('households')
                        .update({ invite_code: code })
                        .eq('id', householdData.id);

                    if (error) throw error;
                    
                    setMessage('✅ Nieuwe invite code gegenereerd!');
                    onUpdate();
                } catch (error) {
                    setMessage('❌ Fout: ' + error.message);
                } finally {
                    setSaving(false);
                }
            };

            const joinHousehold = async () => {
                if (!inviteCode.trim()) return;
                
                setSaving(true);
                setMessage('');
                
                try {
                    const searchCode = inviteCode.trim().toUpperCase();
                    console.log('Searching for invite code:', searchCode);
                    
                    // Find household with this invite code
                    const { data: household, error: findError } = await supabase
                        .from('households')
                        .select('id, name, invite_code')
                        .eq('invite_code', searchCode)
                        .maybeSingle();

                    console.log('Query result:', { household, findError });

                    if (findError) {
                        console.error('Database error:', findError);
                        throw new Error('Database fout: ' + findError.message);
                    }

                    if (!household) {
                        throw new Error('Ongeldige invite code: "' + searchCode + '" niet gevonden');
                    }

                    // Check if user already has this household
                    const { data: existing } = await supabase
                        .from('user_households')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('household_id', household.id)
                        .maybeSingle();

                    if (existing) {
                        throw new Error('Je bent al lid van dit household!');
                    }

                    // Add user to this household (don't make it active yet)
                    const { error: joinError } = await supabase
                        .from('user_households')
                        .insert({
                            user_id: user.id,
                            household_id: household.id,
                            role: 'member',
                            is_active: false
                        });

                    if (joinError) {
                        console.error('Join error:', joinError);
                        throw new Error('Kon niet joinen: ' + joinError.message);
                    }

                    setMessage('✅ Toegevoegd aan household: ' + household.name + '. Switch in het menu!');
                    setTimeout(() => {
                        setInviteCode('');
                        setShowInviteInput(false);
                        onUpdate(); // Refresh household list
                    }, 2000);
                } catch (error) {
                    console.error('Join household error:', error);
                    setMessage('❌ ' + error.message);
                } finally {
                    setSaving(false);
                }
            };

            const saveSettings = async () => {
                setSaving(true);
                setMessage('');
                
                try {
                    // Update profile
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .update({ display_name: displayName })
                        .eq('id', user.id);

                    if (profileError) throw profileError;

                    // Update household name
                    const { error: householdError } = await supabase
                        .from('households')
                        .update({ name: householdName })
                        .eq('id', householdData.id);

                    if (householdError) throw householdError;

                    setMessage('✅ Instellingen opgeslagen!');
                    onUpdate();
                } catch (error) {
                    setMessage('❌ Fout: ' + error.message);
                } finally {
                    setSaving(false);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setMessage('📋 Gekopieerd naar klembord!');
                setTimeout(() => setMessage(''), 2000);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className={`${theme.card} rounded-2xl shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto`}>
                        {/* Header */}
                        <div className="sticky top-0 bg-inherit p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                            <h2 className="text-xl font-bold">Account Instellingen</h2>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <X size={20} />
                            </button>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Profile Section */}
                            <div>
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                                    <User size={20} />
                                    Profiel
                                </h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Email</label>
                                        <input
                                            type="text"
                                            value={user.email}
                                            disabled
                                            className={`w-full p-2 ${theme.border} border rounded-lg ${theme.text} ${darkMode ? 'bg-gray-700' : 'bg-gray-200 text-gray-700'}`}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Weergavenaam</label>
                                        <input
                                            type="text"
                                            value={displayName}
                                            onChange={(e) => setDisplayName(e.target.value)}
                                            placeholder="Jouw naam"
                                            className={`w-full p-2 ${theme.border} border rounded-lg ${theme.text} ${darkMode ? 'bg-gray-700' : 'bg-white'}`}
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Household Section */}
                            <div>
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="text-lg font-semibold flex items-center gap-2">
                                        <Home size={20} />
                                        Household
                                    </h3>
                                    <button
                                        onClick={() => setShowInviteInput(!showInviteInput)}
                                        className={`p-1.5 ${showInviteInput ? 'bg-red-500 hover:bg-red-600' : 'bg-indigo-500 hover:bg-indigo-600'} text-white rounded transition-all`}
                                        title={showInviteInput ? 'Annuleren' : 'Voeg toe aan een ander household'}
                                    >
                                        {showInviteInput ? <X size={16} /> : <Plus size={16} />}
                                    </button>
                                </div>

                                {/* Join Household Form */}
                                {showInviteInput && (
                                    <div className="mb-3 p-3 bg-blue-50 dark:bg-blue-900 dark:bg-opacity-20 border border-blue-200 dark:border-blue-700 rounded-lg space-y-2">
                                        <p className="text-sm font-medium">Voeg toe aan een ander household</p>
                                        <input
                                            type="text"
                                            value={inviteCode}
                                            onChange={(e) => setInviteCode(e.target.value.toUpperCase())}
                                            placeholder="INVITE-CODE"
                                            className={`w-full p-2 ${theme.border} border rounded-lg ${theme.text} font-mono ${darkMode ? 'bg-gray-700' : 'bg-white'}`}
                                            maxLength={6}
                                        />
                                        <button
                                            onClick={joinHousehold}
                                            disabled={saving || !inviteCode.trim()}
                                            className={`w-full p-2 ${theme.button} text-white rounded-lg disabled:opacity-50`}
                                        >
                                            Lid Worden
                                        </button>
                                        <p className="text-xs text-gray-600 dark:text-gray-400">
                                            ⚠️ Je verlaat je huidige household en al je data blijft bij het oude household.
                                        </p>
                                    </div>
                                )}

                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Household Naam</label>
                                        <input
                                            type="text"
                                            value={householdName}
                                            onChange={(e) => setHouseholdName(e.target.value)}
                                            className={`w-full p-2 ${theme.border} border rounded-lg ${theme.text} ${darkMode ? 'bg-gray-700' : 'bg-white'}`}
                                        />
                                    </div>

                                    {/* Invite Code */}
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Invite Code</label>
                                        {householdData?.invite_code ? (
                                            <div className="flex gap-2">
                                                <input
                                                    type="text"
                                                    value={householdData.invite_code}
                                                    readOnly
                                                    className={`flex-1 p-2 ${theme.border} border rounded-lg ${theme.text} font-mono text-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-200 text-gray-700'}`}
                                                />
                                                <button
                                                    onClick={() => copyToClipboard(householdData.invite_code)}
                                                    className={`p-2 ${theme.button} text-white rounded-lg`}
                                                >
                                                    <Copy size={20} />
                                                </button>
                                            </div>
                                        ) : (
                                            <button
                                                onClick={generateInviteCode}
                                                disabled={saving}
                                                className={`w-full p-2 ${theme.button} text-white rounded-lg`}
                                            >
                                                Genereer Invite Code
                                            </button>
                                        )}
                                        <p className="text-xs text-gray-500 mt-1">
                                            Deel deze code met anderen om ze toe te voegen aan je household
                                        </p>
                                    </div>

                                    {householdData?.invite_code && (
                                        <button
                                            onClick={generateInviteCode}
                                            disabled={saving}
                                            className={`w-full p-2 border ${theme.border} rounded-lg text-sm`}
                                        >
                                            Nieuwe Code Genereren
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Members Section */}
                            <div>
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2">
                                    <UserPlus size={20} />
                                    Leden ({householdMembers.length})
                                </h3>
                                <div className="space-y-2">
                                    {householdMembers.map((member, index) => (
                                        <div key={index} className={`p-3 ${theme.border} border rounded-lg flex items-center gap-3`}>
                                            <User size={16} className="text-gray-500" />
                                            <div className="flex-1">
                                                <p className="font-medium">{member.display_name || member.email}</p>
                                                {member.display_name && (
                                                    <p className="text-xs text-gray-500">{member.email}</p>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Message */}
                            {message && (
                                <div className={`p-3 rounded-lg text-sm ${
                                    message.includes('✅') ? 'bg-green-50 text-green-700 dark:bg-green-900 dark:text-green-100' : 
                                    message.includes('❌') ? 'bg-red-50 text-red-700 dark:bg-red-900 dark:text-red-100' :
                                    'bg-blue-50 text-blue-700 dark:bg-blue-900 dark:text-blue-100'
                                }`}>
                                    {message}
                                </div>
                            )}

                            {/* Save Button */}
                            <button
                                onClick={saveSettings}
                                disabled={saving}
                                className={`w-full p-3 ${theme.button} text-white rounded-lg font-medium disabled:opacity-50`}
                            >
                                {saving ? 'Opslaan...' : 'Instellingen Opslaan'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Manage Transactions Screen Component
        const ManageTransactionsScreen = ({ items, sortOrder, currentYear, currentMonth, onEdit, onDelete, onClose, theme, onReorder, getMonthKey }) => {
            const [filter, setFilter] = useState('all'); // all, inkomsten, uitgaven
            const [draggedItemId, setDraggedItemId] = useState(null);

            const filteredItems = items.filter(item => {
                if (filter === 'all') return true;
                return item.type === filter;
            });

            // Use sortOrder if available, otherwise alphabetical
            const monthKey = getMonthKey(currentYear, currentMonth);
            const order = sortOrder[monthKey] || sortOrder['_default'] || filteredItems.map(item => item.id);
            
            const sortedItems = [...filteredItems].sort((a, b) => {
                const indexA = order.indexOf(a.id);
                const indexB = order.indexOf(b.id);
                
                // If both are in the order, use that order
                if (indexA !== -1 && indexB !== -1) {
                    return indexA - indexB;
                }
                // If only one is in order, prioritize it
                if (indexA !== -1) return -1;
                if (indexB !== -1) return 1;
                // Otherwise alphabetical
                return a.name.localeCompare(b.name);
            });

            const handleDragStart = (e, itemId) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', itemId);
                setDraggedItemId(itemId);
            };

            const handleDragOver = (e) => {
                e.preventDefault();

                    setDraggedItemId(null);
                    return;

        // Auth Component

        const FinanceTracker = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            // Initialize dark mode from localStorage for instant load
            const [darkMode, setDarkMode] = useState(() => {
                const cached = localStorage.getItem('finance-dark-mode');
